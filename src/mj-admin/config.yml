  - name: posts
    label: Gallery / Case Studies
    label_singular: Gallery / Case Study
    description: "Visual case studies, latest creations, and image galleries."
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    preview_path: "gallery/{{slug}}/"
    sortable_fields: [title, date, order]
    view_filters:
      - label: Featured on Home
        field: isFeatured
        pattern: true
    fields:
      - { label: Case Study Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Short Summary, name: excerpt, widget: text, hint: "One or two short sentences used in listing cards and previews." }
      - label: Gallery Images
        name: gallery
        widget: list
        collapsed: false
        required: true
        summary: "{{fields.image}}"
        hint: "Upload all images for this Gallery. Mark one image as Cover; if none is marked, the first image becomes the cover automatically. Use JPG/JPEG, PNG, or WebP under 2MB. Recommended: 1600px wide or larger."
        fields:
          - { label: Image, name: image, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. One image per row. Recommended: 1600px wide or larger." }
          - { label: Use as Cover, name: useAsCover, widget: boolean, default: false, required: false, hint: "Turn on for the image used in Home and Gallery listing. If multiple are selected, the first one wins." }
          - { label: Alt Text, name: alt, widget: string, required: false, hint: "Short description for accessibility and image fallback." }
          - { label: Caption, name: caption, widget: string, required: false, hint: "Optional caption shown in lightbox." }
      - { label: Show on Home Gallery, name: isFeatured, widget: boolean, default: false, hint: "Featured items appear in the Home Latest Creations section first." }
      - { label: Tags, name: tags, widget: list, required: false, hint: "Optional labels for organization." }
      - { label: Display Order, name: order, widget: number, default: 999, hint: "Lower numbers appear first. Use 1, 2, 3 for priority items." }
      - { label: SEO Title, name: seoTitle, widget: string, required: false, hint: "Optional. Leave empty to use the case study title automatically." }
      - { label: SEO Description, name: seoDescription, widget: text, required: false, hint: "Optional. Leave empty to use the short summary automatically." }
      - { label: Optional Description Body, name: body, widget: markdown, required: false, hint: "Optional text shown on the detail page. Images remain the main content." }
