backend:
  name: github
  repo: mirkojeck/mjportfolio
  branch: main

local_backend: true

media_folder: public/img/uploads
public_folder: /img/uploads
# Stock Decap Git media uploads do not provide a reliable per-field max file size setting.
# The admin shell adds a best-effort 2MB file-input guard; each image field also repeats the upload guidance.

collections:
  - name: settings
    label: Site Settings
    label_singular: Settings Area
    description: "Global settings, navigation, home page copy, and contact page content."
    files:
      - name: site
        label: Site Settings
        description: "Brand, SEO, contact details, social links, and global display settings."
        file: src/data/site.yml
        fields:
          - label: Brand
            name: brand
            widget: object
            summary: "{{fields.name}}"
            fields:
              - { label: Site Name, name: name, widget: string, hint: "Main public site name." }
              - { label: Short Header Text, name: shortName, widget: string, hint: "Used only when no image logo is uploaded." }
              - { label: Footer Text Logo, name: logoText, widget: string, hint: "Used only when no footer/light logo is uploaded." }
              - { label: Domain, name: domain, widget: string, hint: "Production domain without https://." }
              - label: Logo
                name: logo
                widget: object
                summary: "Light/Dark logos and display controls"
                fields:
                  - { label: Alt Text, name: alt, widget: string, hint: "Example: Mirko Jeck logo." }
                  - label: Logo Images
                    name: images
                    widget: object
                    summary: "Upload light and dark logo versions"
                    fields:
                      - { label: Light Logo, name: light, widget: image, allow_multiple: false, required: false, hint: "JPG/JPEG, PNG, WebP, or SVG under 2MB. Recommended transparent logo canvas: 600x200px. You can drag files into the Media Library, then select them here." }
                      - { label: Dark Logo, name: dark, widget: image, allow_multiple: false, required: false, hint: "JPG/JPEG, PNG, WebP, or SVG under 2MB. Recommended transparent logo canvas: 600x200px. You can drag files into the Media Library, then select them here." }
                      - { label: Footer Logo Override, name: footer, widget: image, allow_multiple: false, required: false, hint: "JPG/JPEG, PNG, WebP, or SVG under 2MB. Usually leave empty; footer reuses Light Logo." }
                      - { label: Fallback Logo, name: fallback, widget: image, allow_multiple: false, required: false, hint: "JPG/JPEG, PNG, WebP, or SVG under 2MB. Optional backup if light/dark versions are not ready." }
                  - label: Logo Display
                    name: display
                    widget: object
                    collapsed: true
                    summary: "Size, zoom, and simple crop controls"
                    fields:
                      - { label: Height, name: height, widget: number, default: 44, min: 16, max: 140, hint: "Recommended: 36-56. Increase only for tall logos." }
                      - { label: Zoom, name: scale, widget: number, default: 1, value_type: float, min: 0.5, max: 3, step: 0.05, hint: "1 means normal. Use 1.1 or 1.2 if the image has too much empty space." }
                      - { label: Move Left/Right, name: positionX, widget: number, default: 50, min: 0, max: 100, hint: "50 is centered. Only matters when Fit Mode is Crop." }
                      - { label: Move Up/Down, name: positionY, widget: number, default: 50, min: 0, max: 100, hint: "50 is centered. Only matters when Fit Mode is Crop." }
                      - { label: Fit Mode, name: objectFit, widget: select, options: [{ label: Show full logo - recommended, value: contain }, { label: Crop inside logo box, value: cover }], default: contain, hint: "Decap has no visual crop editor. Use Crop with Move/Zoom only when needed." }
          - label: Layout Selection
            name: display
            widget: object
            collapsed: false
            summary: "Home {{fields.homeVariant}}, Portfolio {{fields.portfolioLayout}}"
            hint: "Choose the active public layout. The other variants stay available at their direct URLs for review."
            fields:
              - label: Active Home Variant
                name: homeVariant
                widget: select
                default: home1
                options:
                  - { label: Home 1 - main animated portfolio, value: home1 }
                  - { label: Home 2 - alternate intro layout, value: home2 }
              - label: Active Portfolio Layout
                name: portfolioLayout
                widget: select
                default: mixedGrid
                options:
                  - { label: Mixed Grid - original portfolio-1 pattern, value: mixedGrid }
                  - { label: Wide Grid - original portfolio-2 pattern, value: wideGrid }
                  - { label: Slider - original portfolio-3 pattern, value: slider }
          - label: SEO
            name: seo
            widget: object
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: Default Title, name: title, widget: string }
              - { label: Default Description, name: description, widget: text }
              - { label: Open Graph Image, name: image, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Recommended: 1200x630px for social sharing." }
              - { label: Favicon, name: favicon, widget: image, allow_multiple: false, hint: "SVG, PNG, or WebP under 2MB. Recommended: SVG or 512x512 PNG." }
              - { label: Fallback Canonical Base URL, name: canonicalBaseUrl, widget: string, hint: "Fallback only. The main public URL is generated from Brand > Domain. Use https://example.com with no trailing slash." }
          - label: Projects Display
            name: projects
            widget: object
            collapsed: true
            summary: "Sort {{fields.sortDirection}}, featured limit {{fields.featuredLimit}}"
            fields:
              - { label: Sort Direction, name: sortDirection, widget: select, options: [asc, desc], default: desc }
              - { label: Featured Limit, name: featuredLimit, widget: number, default: 6, min: 1 }
          - label: Gallery Display
            name: gallery
            widget: object
            collapsed: true
            summary: "Hover-expand gallery"
            fields:
              - { label: Home Gallery Limit, name: homeLimit, widget: number, default: 6, min: 1, max: 12, hint: "The home page gallery works best with 4 to 6 images." }
          - label: Contact
            name: contact
            widget: object
            collapsed: true
            summary: "{{fields.email}}"
            fields:
              - { label: Email, name: email, widget: string, hint: "Public contact email shown on the site." }
              - { label: Phone, name: phone, widget: string, hint: "Public phone number shown on the site." }
              - { label: City, name: city, widget: string, required: false, hint: "Primary city shown on the contact page." }
              - { label: Country / Region, name: region, widget: string, required: false, hint: "Country or region shown on the contact page." }
              - { label: Availability Text, name: availability, widget: text, required: false, hint: "Short line shown above email/phone on the contact page." }
              - { label: CTA Label, name: ctaLabel, widget: string, required: false, hint: "Optional contact CTA text for future reuse." }
              - { label: Show Contact Form, name: showForm, widget: boolean, default: true, hint: "Turn off to hide the design-only form without breaking the contact layout." }
              - label: Locations
                name: locations
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Address, name: address, widget: text }
                  - { label: Phone, name: phone, widget: string }
          - label: Social Links
            name: socials
            widget: list
            collapsed: false
            summary: "{{fields.platform}}"
            hint: "Choose the platform, then paste the profile link. The footer icon is selected automatically."
            fields:
              - label: Platform
                name: platform
                widget: select
                options:
                  - { label: Instagram, value: instagram }
                  - { label: LinkedIn, value: linkedin }
                  - { label: Facebook, value: facebook }
                  - { label: Behance, value: behance }
                  - { label: X / Twitter, value: x }
                  - { label: WhatsApp, value: whatsapp }
              - { label: Accessible Label, name: label, widget: string, hint: "Example: Instagram. Used for screen readers." }
              - { label: URL, name: href, widget: string, hint: "Use a full URL, for example https://instagram.com/name." }
              - { label: Enabled, name: enabled, widget: boolean, default: true, hint: "Turn off to hide this social link everywhere." }
              - { label: Display Order, name: order, widget: number, default: 999, hint: "Lower numbers appear first." }
          - label: Legal Links
            name: legalLinks
            widget: list
            required: false
            hint: "Legacy fallback only. Use the Legal Pages collection for footer/menu legal links."
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: href, widget: string, hint: "Use a relative URL like /privacy/ or a full external URL." }
      - name: navigation
        label: Navigation
        description: "Main menu and footer links. Use relative URLs like /portfolio/ for internal pages."
        file: src/data/navigation.yml
        fields:
          - label: Main Menu
            name: main
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: href, widget: string, hint: "Internal links should start and end with slash, for example /portfolio/." }
          - label: Footer Menu
            name: footer
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: href, widget: string, hint: "Internal links should start and end with slash, for example /contact/." }
      - name: home
        label: Home Page
        description: "Editable home page sections. This controls copy and image choices only, not layout or animation code."
        file: src/data/home.yml
        fields:
          - label: Hero
            name: hero
            widget: object
            summary: "{{fields.titlePart1}} {{fields.titleThin1}}"
            fields:
              - { label: Preloader Line 1, name: preloaderLine1, widget: string }
              - { label: Preloader Line 2, name: preloaderLine2, widget: string }
              - { label: Preloader Line 3, name: preloaderLine3, widget: string }
              - { label: Title Part 1, name: titlePart1, widget: string }
              - { label: Thin Title Part 1, name: titleThin1, widget: string }
              - { label: Title Part 2, name: titlePart2, widget: string }
              - { label: Thin Title Part 2, name: titleThin2, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: CTA Label, name: ctaLabel, widget: string }
              - { label: CTA URL, name: ctaHref, widget: string, hint: "Use a relative URL like /portfolio/ or a full external URL." }
              - { label: Secondary CTA Label, name: secondaryCtaLabel, widget: string }
              - { label: Secondary CTA URL, name: secondaryCtaHref, widget: string, hint: "Use a relative URL like /contact/ or a full external URL." }
          - label: About
            name: about
            widget: object
            collapsed: true
            summary: "{{fields.titlePart1}} {{fields.titlePart2}}"
            fields:
              - { label: Title Part 1, name: titlePart1, widget: string }
              - { label: Title Part 2, name: titlePart2, widget: string }
              - { label: Thin Title, name: titleThin, widget: string }
              - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: paragraph, widget: text } }
              - { label: Quote, name: quote, widget: text }
              - { label: Quote Image, name: quoteImage, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Small portrait/detail image. Recommended: square 800x800px." }
              - { label: Main Image, name: image, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Large about image. Recommended: 1400px wide or larger." }
          - label: Services Preview
            name: servicesPreview
            widget: object
            collapsed: true
            summary: "{{fields.titleLine1}} {{fields.titleLine2}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: text }
              - { label: Title Line 1, name: titleLine1, widget: string }
              - { label: Title Line 2, name: titleLine2, widget: string }
              - { label: Image, name: image, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Recommended: portrait/vertical image, 1200px tall or larger." }
              - { label: CTA Label, name: ctaLabel, widget: string }
              - { label: CTA URL, name: ctaHref, widget: string, hint: "Use a relative URL like /services/." }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Summary, name: summary, widget: text }
                  - { label: URL, name: href, widget: string, hint: "Use a relative URL like /services/brand-strategy/." }
          - label: Featured Projects
            name: featuredProjects
            widget: object
            collapsed: true
            summary: "{{fields.heading}}"
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Source, name: source, widget: select, options: [{ label: Projects marked Featured, value: isFeatured }], default: isFeatured }
              - { label: Limit, name: limit, widget: number, default: 6, min: 1, max: 12, hint: "Homepage design works best with 4 to 6 featured projects." }
          - label: Team Preview
            name: teamPreview
            widget: object
            collapsed: true
            summary: "{{fields.titlePart1}} {{fields.titlePart2}}"
            fields:
              - { label: Title Part 1, name: titlePart1, widget: string }
              - { label: Title Part 2, name: titlePart2, widget: string }
              - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: paragraph, widget: text } }
              - { label: CTA Label, name: ctaLabel, widget: string }
              - { label: CTA URL, name: ctaHref, widget: string, hint: "Use a relative URL like /team/." }
              - { label: Closing Line 1, name: closingLine1, widget: string }
              - { label: Closing Line 2, name: closingLine2, widget: string }
              - { label: Note, name: note, widget: string }
              - label: Members
                name: members
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Role, name: role, widget: string }
                  - { label: Image, name: image, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Recommended: square portrait 900x900px." }
                  - { label: URL, name: href, widget: string, hint: "Use a relative URL like /team/." }
                  - label: Social Links
                    name: socials
                    widget: list
                    required: false
                    collapsed: true
                    summary: "{{fields.platform}} - {{fields.href}}"
                    hint: "Optional. These appear inside the team card hover overlay, matching the original template."
                    fields:
                      - label: Platform
                        name: platform
                        widget: select
                        options:
                          - { label: Instagram, value: instagram }
                          - { label: LinkedIn, value: linkedin }
                          - { label: Facebook, value: facebook }
                          - { label: Behance, value: behance }
                          - { label: Dribbble, value: dribbble }
                          - { label: X / Twitter, value: twitter }
                          - { label: GitHub, value: github }
                          - { label: WhatsApp, value: whatsapp }
                      - { label: Accessible Label, name: label, widget: string, hint: "Example: Behance." }
                      - { label: URL, name: href, widget: string, hint: "Use a full URL, for example https://behance.net/name." }
          - label: Reviews
            name: reviews
            widget: object
            collapsed: true
            summary: "{{fields.titlePart1}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: text }
              - { label: Title Part 1, name: titlePart1, widget: string }
              - { label: Title Part 2, name: titlePart2, widget: string }
              - label: Items
                name: items
                widget: list
                collapsed: false
                summary: "{{fields.name}} - {{fields.company}}"
                hint: "Customer Voices section. Each review needs a client image because the original design uses circular customer photos as pagination buttons."
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Company, name: company, widget: string }
                  - { label: Customer Photo, name: image, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Required for the circular review selector. Recommended: square portrait 400x400px." }
                  - { label: Quote, name: quote, widget: text }
          - label: Partners
            name: partners
            widget: list
            collapsed: true
            summary: "{{fields.image}}"
            fields:
              - { label: Image, name: image, widget: image, allow_multiple: false, hint: "PNG, WebP, or SVG under 2MB. Partner logo, preferably transparent. Recommended width: 300-600px." }
              - { label: URL, name: href, widget: string, hint: "Use # if the logo should not link anywhere." }
              - { label: Width, name: width, widget: string }
          - label: Home Gallery Preview
            name: blogPreview
            widget: object
            collapsed: true
            summary: "{{fields.heading}}"
            fields:
              - { label: Heading, name: heading, widget: string, hint: "Example: Our Latest Creations." }
              - { label: Short Description, name: description, widget: text, required: false, hint: "Appears under the Gallery heading on the home page." }
              - { label: CTA Label, name: ctaLabel, widget: string }
              - { label: CTA URL, name: ctaHref, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Category, name: category, widget: string }
                  - { label: Date Label, name: date, widget: string }
                  - { label: Image, name: image, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Recommended: landscape 1600x1000px." }
                  - { label: URL, name: href, widget: string, hint: "Use a relative URL like /gallery/case-study-slug/." }
                  - { label: Excerpt, name: excerpt, widget: text }
          - label: Call To Action
            name: callToAction
            widget: object
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: text }
              - { label: Title, name: title, widget: string }
              - { label: CTA Label, name: ctaLabel, widget: string }
              - { label: CTA URL, name: ctaHref, widget: string, hint: "Use a relative URL like /contact/." }
      - name: contact
        label: Contact Page
        description: "Contact page headline, form labels, and map embed."
        file: src/data/contact-page.yml
        fields:
          - { label: Heading, name: heading, widget: string }
          - { label: Description, name: description, widget: text }
          - label: Form
            name: form
            widget: object
            fields:
              - { label: Name Label, name: nameLabel, widget: string }
              - { label: Email Label, name: emailLabel, widget: string }
              - { label: Message Label, name: messageLabel, widget: string }
              - { label: Submit Label, name: submitLabel, widget: string }
          - { label: Map Embed URL, name: mapEmbedUrl, widget: string, required: false, hint: "Paste a Google Maps embed URL only. Leave empty to hide or keep the default map area." }
      - name: pages
        label: Page Copy
        description: "Page-level headings and CTA text for portfolio, services, team, gallery, publications, and contact hero labels."
        file: src/data/pages.yml
        fields:
          - label: Portfolio Page
            name: portfolio
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Title Line 1, name: titleLine1, widget: string }
                  - { label: Title Line 2, name: titleLine2, widget: string }
                  - { label: Title Line 3, name: titleLine3, widget: string }
                  - { label: Down Arrow Label, name: downArrowLabel, widget: string }
              - label: Bottom CTA
                name: cta
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: text }
                  - { label: Title Line 1, name: titleLine1, widget: string }
                  - { label: Title Line 2, name: titleLine2, widget: string }
                  - { label: Title Line 3, name: titleLine3, widget: string }
                  - { label: Title Line 4, name: titleLine4, widget: string }
                  - { label: Title Line 5, name: titleLine5, widget: string }
                  - { label: Button Label, name: buttonLabel, widget: string }
          - label: Services Page
            name: services
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Title Line 1, name: titleLine1, widget: string }
                  - { label: Title Line 2, name: titleLine2, widget: string }
                  - { label: Title Line 3, name: titleLine3, widget: string }
                  - { label: Title Line 4, name: titleLine4, widget: string }
                  - { label: Down Arrow Label, name: downArrowLabel, widget: string }
              - label: Bottom CTA
                name: cta
                widget: object
                fields:
                  - { label: Eyebrow, name: eyebrow, widget: text }
                  - { label: Title Line 1, name: titleLine1, widget: string }
                  - { label: Title Line 2, name: titleLine2, widget: string }
                  - { label: Title Line 3, name: titleLine3, widget: string }
                  - { label: Title Line 4, name: titleLine4, widget: string }
                  - { label: Title Line 5, name: titleLine5, widget: string }
                  - { label: Button Label, name: buttonLabel, widget: string }
              - label: Service Detail
                name: detail
                widget: object
                fields:
                  - { label: Down Arrow Label, name: downArrowLabel, widget: string }
                  - { label: Start Project Button Label, name: startProjectLabel, widget: string }
          - label: Team Page
            name: team
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Title Line 1, name: titleLine1, widget: string }
                  - { label: Title Line 2, name: titleLine2, widget: string }
                  - { label: Title Line 3, name: titleLine3, widget: string }
                  - { label: Title Line 4, name: titleLine4, widget: string }
                  - { label: Down Arrow Label, name: downArrowLabel, widget: string }
          - label: Gallery Page
            name: gallery
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Title Line 1, name: titleLine1, widget: string }
                  - { label: Title Line 2, name: titleLine2, widget: string }
                  - { label: Down Arrow Label, name: downArrowLabel, widget: string }
              - label: Card Labels
                name: card
                widget: object
                fields:
                  - { label: View Label, name: viewLabel, widget: string }
          - label: Publications Page
            name: publications
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Title Line 1, name: titleLine1, widget: string }
                  - { label: Title Line 2, name: titleLine2, widget: string }
                  - { label: Down Arrow Label, name: downArrowLabel, widget: string }
              - label: Listing Labels
                name: listing
                widget: object
                fields:
                  - { label: Read More Label, name: readMoreLabel, widget: string }
              - label: Detail Navigation Labels
                name: detail
                widget: object
                fields:
                  - { label: Previous Label, name: prevLabel, widget: string }
                  - { label: All Label, name: allLabel, widget: string }
                  - { label: Next Label, name: nextLabel, widget: string }
          - label: Contact Page
            name: contact
            widget: object
            fields:
              - label: Hero
                name: hero
                widget: object
                fields:
                  - { label: Down Arrow Label, name: downArrowLabel, widget: string }
  - name: projects
    label: Projects
    label_singular: Project
    description: "Portfolio projects shown on the portfolio page and optionally featured on the home page."
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    preview_path: "projects/{{slug}}/"
    sortable_fields: [title, year, date, order]
    view_filters:
      - label: Featured Projects
        field: isFeatured
        pattern: true
    view_groups:
      - label: Year
        field: year
    fields:
      - { label: Project Title, name: title, widget: string }
      - { label: Short Summary, name: summary, widget: text, hint: "One short paragraph used on cards and detail pages." }
      - { label: Cover Image, name: cover, widget: image, allow_multiple: false, hint: "JPG/JPEG, PNG, or WebP under 2MB. Recommended: landscape 1600x1000px." }
      - label: Detail Page Layout
        name: detailLayout
        widget: select
        default: project1Grid
        hint: "Controls the project detail page visual pattern. Images are reused from Project Gallery Images in their current order."
        options:
          - { label: Project 1 - hero plus square grid, value: project1Grid }
          - { label: Project 2 - stacked horizontal images, value: project2Stacked }
          - { label: Project 3 - horizontal image slider, value: project3HorizontalSlider }
          - { label: Project 4 - vertical image slider, value: project4VerticalSlider }
          - { label: Project 5 - full-width hero plus square slider, value: project5FullWidthSquareSlider }
          - { label: Project 6 - full-width hero plus mixed sliders, value: project6FullWidthMixedSliders }
      - label: Project Gallery Images
        name: gallery
        widget: list
        collapsed: false
        required: false
        hint: "Images used on the project detail page and lightbox gallery. Recommended: 1600px wide or larger."
        field:
          label: Gallery Image
          name: image
          widget: image
          allow_multiple: false
          hint: "JPG/JPEG, PNG, or WebP under 2MB. Recommended: 1600px wide or larger."
      - { label: Client, name: client, widget: string }
      - { label: Year, name: year, widget: number }
      - { label: Project Date, name: date, widget: datetime, required: false, hint: "Optional. Used as fallback sorting when Display Order is the same." }
      - { label: Services Used, name: services, widget: list, required: false, hint: "Add short service labels, for example Brand direction or Web experience." }
      - { label: External URL, name: externalUrl, widget: string, required: false, hint: "Optional full URL to a live project or external case study." }
      - { label: Display Order, name: order, widget: number, default: 999, hint: "Lower numbers appear first. Use 1, 2, 3 for priority items." }
      - { label: Show on Home Page, name: isFeatured, widget: boolean, default: false, hint: "Featured projects can appear on the home page." }
      - { label: SEO Title, name: seoTitle, widget: string, required: false, hint: "Optional. Leave empty to use the project title." }
      - { label: SEO Description, name: seoDescription, widget: text, required: false, hint: "Optional. Leave empty to use the short summary." }
      - { label: Optional Detail Text, name: body, widget: markdown, required: false, hint: "Optional text shown on the project detail page." }
  - name: services
    label: Services
    label_singular: Service
    description: "Service cards and service detail pages."
    folder: src/content/services
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    preview_path: "services/{{slug}}/"
    sortable_fields: [title, order]
    fields:
      - { label: Service Title, name: title, widget: string }
      - { label: Short Summary, name: summary, widget: text, hint: "One short paragraph used on service cards and detail pages." }
      - { label: Feature List, name: features, widget: list, required: false, hint: "Add short bullet points. Keep each item concise." }
      - label: Accordion Process
        name: process
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.title}}"
        hint: "Optional accordion rows for the service detail page, matching the original service.html interaction."
        fields:
          - { label: Step Title, name: title, widget: string }
          - { label: Step Description, name: description, widget: text }
      - { label: Display Order, name: order, widget: number, default: 999, hint: "Lower numbers appear first." }
      - { label: SEO Title, name: seoTitle, widget: string, required: false, hint: "Optional. Leave empty to use the service title." }
      - { label: SEO Description, name: seoDescription, widget: text, required: false, hint: "Optional. Leave empty to use the short summary." }
  - name: team
